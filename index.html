<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D Transform Sandbox — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">📦</span>
                <div class="title-col">
                    <h1>CSS 3D Transform Sandbox</h1>
                    <p class="tagline">Skew, rotate, and scale elements in simulated 3D perspectives.</p>
                </div>
            </div>
            <div class="badge">css</div>
        </header>

        <main class="workspace-card">
            
            <div style="display:flex; justify-content:center; padding:40px 0; perspective: 400px;">
                <div id="trans-box" style="width:80px; height:80px; background:var(--accent); border-radius:8px; transition: transform 0.2s;"></div>
            </div>
            <input type="range" id="trans-rot" min="0" max="360" value="45" style="width:100%;">
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
